# Example for: em-tools amazon products upload-from-es --config config/amz_celery_compat.example.yml
#
# ASIN stream keys match +em_tasks+ +asin_stream_options+ / +UploadableProductFilter+.
# Price rules mirror +em_celery/tools/spree/amz_upload_products_from_es.py+ (+price_rules_cfg+).

amz.uploadable_filter.asin_stream:
  time_field: auto
  cutoff: null
  label: null
  label_field: label

# Flat key form (same as many Python config stores) also works:
# price.rules.amz_de:
#   roi: 0.35
#   ad_cost: 4.5
#   transfer_cost: 0

price:
  rules:
    amz_de:
      roi: 0.35
      ad_cost: 4.5
      transfer_cost: 0
