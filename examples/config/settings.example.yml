# Copy to config/settings.yml when you need committed structural defaults beyond .env
# (e.g. inventory_sync.sources, exporters routing). EM_TOOLS_SETTINGS_PATH overrides location.
#
# Project structure / routing only — secrets and connection URLs belong in .env.
# See README "Configuration" for the full ENV var list.

default: &default
  elasticsearch:
    url: http://localhost:9200       # local fallback; .env ELASTICSEARCH_URL wins

  elasticsearch_clusters:
    primary:
      url: http://localhost:9200
    analytics:
      url: http://localhost:9200     # .env DATA_ELASTICSEARCH_URL or ELASTICSEARCH_CLUSTER_ANALYTICS_URL wins

  exporters:
    ssg_products:
      cluster: primary
      index: ssg_products
    lotteon_products:
      cluster: analytics
      index: user1_lotteon_products

  redis:
    url: redis://localhost:6379/0    # local fallback; .env REDIS_URL wins

  gcs:
    buckets:
      inventory: em-bucket

  sites:
    example_partner:
      base_url: https://partner.example.com
      endpoint: https://partner.example.com/api/v1

  # Per-source ES routing. Each source may override +cluster:+; section default
  # below is the fallback. Cluster name -> URL mapping:
  #   primary           -> .env ELASTICSEARCH_URL
  #   data / analytics  -> .env DATA_ELASTICSEARCH_URL (fallback ELASTICSEARCH_URL)
  #   <custom>          -> .env ELASTICSEARCH_CLUSTER_<NAME>_URL or elasticsearch_clusters.<name>.url
  inventory_sync:
    cluster: primary
    index: em_inventory
    refresh: false
    prune_obsolete: false
    sources: []

development:
  <<: *default
  inventory_sync:
    cluster: primary
    sources:
      - gs://em-bucket/AMZ_AE-Inv.csv      # uses section default (primary)
      - gs://em-bucket/AMZ_CA-Inv.csv
      - uri: gs://em-bucket/Ebay_US-Inv.csv
        cluster: data                       # this one writes to DATA_ELASTICSEARCH_URL

test:
  elasticsearch:
    url: http://127.0.0.1:9200

production:
  <<: *default
  inventory_sync:
    sources:
      - gs://em-bucket/boyner-Inv.csv
