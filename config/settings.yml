# Project structure / routing only — secrets and connection URLs belong in .env.
#
# What goes here:
#   - inventory_sync.sources         (which GCS CSVs to sync per APP_ENV)
#   - google_ads_catalog_sync.sources (Google Ads catalog CSVs; separate from inventory)
#   - exporters.<name>               (which cluster + index each exporter writes to)
#   - elasticsearch_clusters.<name>  (LOCAL dev URLs only; .env's *_ELASTICSEARCH_URL wins)
#   - gcs.buckets                    (bucket name routing, not credentials)
#   - sites.<name>                   (per-site base_url / endpoint placeholders, hydrated to ENV)
#
# What does NOT go here (use .env):
#   - ELASTICSEARCH_URL / DATA_ELASTICSEARCH_URL  (real cluster URLs with auth)
#   - GCS_SERVICE_ACCOUNT_PATH / GCS_CREDENTIALS  (key path / JSON content)
#   - BLACKLIST_API_ENDPOINT / BLACKLIST_API_PATH / BLACKLIST_API_TOKEN
#
# Merging: "default" deep-merged with the section named by APP_ENV
# (defaults to "development"; RAILS_ENV / RACK_ENV are also accepted). ERB allowed.

default: &default
  elasticsearch:
    url: http://localhost:9200       # local dev fallback; .env ELASTICSEARCH_URL overrides

  # Routing table only. Real hosts come from .env (DATA_ELASTICSEARCH_URL or
  # ELASTICSEARCH_CLUSTER_<NAME>_URL); these stay on localhost so nothing leaks via git.
  elasticsearch_clusters:
    primary:
      url: http://localhost:9200
    analytics:
      url: http://localhost:9200

  # Map exporter -> cluster + target index. Used by EmTools::Core::Config.exporter_*.
  exporters:
    ssg_products:
      cluster: primary
      index: ssg_products
    lotteon_products:
      cluster: analytics
      index: user1_lotteon_products
    # Oliveyoung exports filter by source=oliveyoung (see
    # EmTools::Plugins::Oliveyoung::Queries::ProductsQuery), so this index
    # can be a shared multi-source product index.
    oliveyoung_products:
      cluster: primary
      index: oliveyoung_products
    lazada_th_products:
      cluster: primary
      index: user1_lazadacoth_products
    lazada_my_products:
      cluster: primary
      index: user1_lazadamys_products

  # Optional overrides per Lazada marketplace (+th+, +my+, or custom keys).
  # Defaults are baked into {EmTools::Plugins::Lazada::MarketplaceProfile}.
  lazada_marketplaces: {}

  redis:
    url: redis://localhost:6379/0    # local dev fallback; .env REDIS_URL overrides

  # Bucket name routing only. Service account path / JSON live in .env.
  gcs:
    buckets:
      inventory: em-bucket

  # Per-site placeholder structure. SettingsHydrator copies endpoint/base_url/token
  # into ENV[EM_TOOLS_SITE_<NAME>_*] only when those env vars are unset.
  sites:
    example_partner:
      base_url: https://partner.example.com
      endpoint: https://partner.example.com/api/v1

  # Per-source ES routing.
  #   cluster:  optional section default; falls back to "primary" (=ELASTICSEARCH_URL).
  #             Each source can override with its own +cluster:+ key.
  # Cluster names map to .env URLs:
  #   primary             -> ELASTICSEARCH_URL
  #   data / analytics    -> DATA_ELASTICSEARCH_URL (falls back to ELASTICSEARCH_URL)
  #   <other>             -> ELASTICSEARCH_CLUSTER_<NAME>_URL (or elasticsearch_clusters.<name>.url)
  inventory_sync:
    cluster: primary
    index: em_inventory
    refresh: false
    prune_obsolete: false
    sources: []

  # Google Ads product catalog (SKUs in ads) -> google_ads_products index.
  # Not read by inventory_sync; use: em-tools google-ads catalog sync
  google_ads_catalog_sync:
    cluster: primary
    index: google_ads_products
    refresh: false
    prune_obsolete: false
    sources: []

development:
  <<: *default
  inventory_sync:
    cluster: primary
    index: em_inventory
    refresh: false
    prune_obsolete: false
    sources:
      # AMZ_{marketplace}-Inv.csv on GCS -> em_inventory (_id = ProductID / product_id).
      - gs_uri_template: gs://em-bucket/AMZ_{marketplace}-Inv.csv
        marketplaces: all          # AE CA US DE UK IN IT MX JP TR — or list codes e.g. [TR, DE]
      - uri: gs://em-bucket/Ebay_US-Inv.csv
        cluster: data              # writes to DATA_ELASTICSEARCH_URL instead

  # Same GCS layout as inventory CSVs; replace with your Merchant Center / Ads export paths.
  google_ads_catalog_sync:
    cluster: primary
    index: google_ads_products
    refresh: false
    prune_obsolete: false
    sources:
      # Tab-separated JSON per line: <ignored>\t{"product_id":...,"source_product_id":"B0..."}
      - uri: gs://em-bucket/em-analytics/sources/AMZ_DE.txt
        format: tab_json
        source: AMZ_DE
        feed_id: AMZ_DE
        prune_obsolete: false   # true deletes stale rows after sync; may 504 on large indexes

test:
  elasticsearch:
    url: http://127.0.0.1:9200

production:
  <<: *default
  inventory_sync:
    index: em_inventory
    refresh: false
    prune_obsolete: false
    sources:
      - gs://em-bucket/boyner-Inv.csv
